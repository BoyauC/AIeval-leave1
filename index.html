<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI創意領航員 — 國小組複審評分平台</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #0d0f1e; --panel: #12142a; --border: #2a2d4a;
  --accent: #6c8ef5; --accent2: #00d4aa; --text: #e2e4f0; --muted: #7a7d99;
  --hover: #1c1f3a; --score-bg: #161830;
  --green: #4ade80; --red: #f87171; --yellow: #facc15;
  --tag: #2a2d45;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* Header */
header { background: var(--panel); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
header h1 { font-size: 1rem; font-weight: 700; color: var(--accent); }
.header-btn { background: var(--tag); border: 1px solid var(--border); color: var(--text); padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 0.82rem; transition: background .15s; white-space: nowrap; }
.header-btn:hover { background: var(--hover); }

/* Main layout */
.main { display: flex; flex: 1; overflow: hidden; }

/* Left panel */
.left-panel { width: 240px; flex-shrink: 0; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.panel-header { padding: 10px 12px; font-size: 0.78rem; color: var(--muted); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.work-list { flex: 1; overflow-y: auto; }
.work-item { padding: 10px 12px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
.work-item:hover { background: var(--hover); }
.work-item.active { background: var(--hover); border-left: 3px solid var(--accent); }
.work-item .num { font-size: 0.70rem; color: var(--muted); }
.work-item .title { font-size: 0.88rem; font-weight: 600; margin-top: 2px; }
.work-item .meta { font-size: 0.70rem; color: var(--muted); margin-top: 2px; }
.score-badge { font-size: 0.72rem; margin-top: 4px; color: var(--muted); }
.score-badge.done { color: var(--green); }

/* Center viewer */
.center-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
.viewer-tabs { display: flex; background: var(--panel); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.tab-btn { padding: 10px 16px; font-size: 0.82rem; background: none; border: none; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-btn.disabled { color: var(--border); cursor: not-allowed; opacity: 0.45; }
.tab-btn.disabled:hover { border-bottom-color: transparent; }
.viewer-content { flex: 1; display: flex; overflow: hidden; }
.tab-pane { display: none; flex: 1; overflow: auto; }
.tab-pane.active { display: flex; flex-direction: column; }
#dialog1-pane.active, #dialog2-pane.active { flex-direction: column; }

/* PDF controls */
#pdf-controls { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--panel); border-bottom: 1px solid var(--border); flex-shrink: 0; font-size: 0.82rem; }
#pdf-controls button { background: var(--hover); border: 1px solid var(--border); color: var(--text); padding: 4px 12px; border-radius: 4px; cursor: pointer; }
#pdf-controls button:hover { border-color: var(--accent); }
#pdf-controls select { background: var(--hover); border: 1px solid var(--border); color: var(--text); padding: 3px 6px; border-radius: 4px; font-size: 0.78rem; }
#pdf-page-info { color: var(--muted); font-size: 0.78rem; min-width: 60px; text-align: center; }

/* Work and entry containers */
#work-container, #entry-container { flex: 1; overflow: auto; display: flex; flex-direction: column; align-items: center; padding: 12px; }

/* No file placeholder */
.no-file-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--muted); gap: 10px; font-size: 0.9rem; }
.no-file-placeholder .icon { font-size: 2.5rem; opacity: 0.25; }

/* Ext link button */
.ext-btn-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 16px; }
.ext-link-btn { display: inline-block; padding: 10px 24px; background: var(--accent); color: #fff; border-radius: 6px; text-decoration: none; font-size: 0.9rem; }
.ext-link-btn:hover { opacity: 0.85; }

/* Excel table */
.xlsx-table { border-collapse: collapse; font-size: 0.78rem; min-width: 100%; }
.xlsx-table th, .xlsx-table td { border: 1px solid var(--border); padding: 4px 8px; white-space: nowrap; cursor: pointer; }
.xlsx-table th { background: var(--panel); color: var(--accent); font-weight: 600; }
.xlsx-table td:hover { background: var(--hover); }
.xlsx-table td.selected { background: #1e2a50; outline: 2px solid var(--accent); outline-offset: -1px; }
.xlsx-table tr:nth-child(even) td { background: var(--score-bg); }
.xlsx-table tr:nth-child(even) td:hover { background: var(--hover); }
.xlsx-table tr:nth-child(even) td.selected { background: #1e2a50; }

/* Cell preview bar */
.cell-preview-bar { flex-shrink: 0; background: #12142a; border-top: 1px solid var(--border); padding: 6px 10px; display: flex; align-items: flex-start; gap: 8px; font-size: 0.78rem; min-height: 38px; max-height: 100px; }
.cell-preview-label { color: var(--accent); font-weight: 600; white-space: nowrap; padding-top: 2px; font-size: 0.72rem; }
.cell-preview-addr { color: var(--muted); white-space: nowrap; padding-top: 2px; min-width: 50px; }
.cell-preview-content { color: var(--text); line-height: 1.5; white-space: pre-wrap; word-break: break-all; overflow-y: auto; flex: 1; }

/* Right panel */
.right-panel { width: 320px; flex-shrink: 0; background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.right-panel .panel-header { padding: 10px 14px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 0.9rem; flex-shrink: 0; color: var(--text); }
.scoring-body { flex: 1; overflow-y: auto; padding: 12px; }
.initial-row { background: var(--tag); border-radius: 6px; padding: 8px 10px; margin-bottom: 12px; font-size: 0.78rem; color: var(--muted); display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.initial-row span { color: var(--text); font-weight: 600; }
.criterion-block { margin-bottom: 14px; }
.criterion-label { font-size: 0.8rem; font-weight: 600; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }
.criterion-desc { font-size: 0.72rem; color: var(--muted); margin-bottom: 6px; line-height: 1.4; }
.quick-btns { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 5px; }
.quick-btn { background: var(--score-bg); border: 1px solid var(--border); color: var(--text); padding: 4px 10px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; transition: background .1s; }
.quick-btn:hover { background: var(--hover); border-color: var(--accent); }
.quick-btn.selected { background: var(--accent); border-color: var(--accent); color: #fff; }
.score-input { width: 70px; background: var(--score-bg); border: 1px solid var(--border); color: var(--text); padding: 4px 8px; border-radius: 5px; font-size: 0.9rem; text-align: center; }
.score-input:focus { outline: none; border-color: var(--accent); }
hr.divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
.total-row { display: flex; justify-content: space-between; align-items: center; font-weight: 700; }
.total-score { font-size: 1.5rem; color: var(--accent2); }
.initial-total { font-size: 0.82rem; color: var(--muted); }
.comment-area { width: 100%; background: var(--score-bg); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 8px; font-size: 0.82rem; resize: vertical; min-height: 60px; font-family: inherit; }
.comment-area:focus { outline: none; border-color: var(--accent); }
.action-btns { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.action-btn { flex: 1; padding: 8px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.82rem; font-weight: 600; transition: opacity .15s; }
.action-btn:hover { opacity: .85; }
.btn-ai { background: #3b3680; color: #c4b5fd; }
.btn-next { background: #1e3a5f; color: #93c5fd; }
.ai-panel { background: #14122a; border: 1px solid #3b3680; border-radius: 8px; padding: 12px; margin-top: 10px; display: none; }
.ai-panel.show { display: block; }
.ai-panel input { width: 100%; background: var(--score-bg); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 5px; font-size: 0.8rem; margin-bottom: 8px; }
.ai-panel input:focus { outline: none; border-color: var(--accent); }
.ai-result { font-size: 0.78rem; color: var(--muted); line-height: 1.6; white-space: pre-wrap; margin-top: 6px; max-height: 200px; overflow-y: auto; }
#toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #22263a; border: 1px solid var(--border); color: var(--text); padding: 10px 20px; border-radius: 8px; font-size: 0.85rem; display: none; z-index: 999; }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>

<header>
  <h1 style="flex:1">🎓 AI創意領航員 — 國小組複審評分平台</h1>

</header>

<div class="main">
  <!-- Left: Work list -->
  <div class="left-panel">
    <div class="panel-header">作品列表 (<span id="work-count">90</span>件)</div>
    <div class="work-list" id="work-list"></div>
  </div>

  <!-- Center: Viewer -->
  <div class="center-panel">
    <div class="viewer-tabs">
      <button class="tab-btn active" onclick="switchTab('work')" id="tab-work">📄 作品</button>
      <button class="tab-btn" onclick="switchTab('entry')" id="tab-entry">📋 報名表</button>
      <button class="tab-btn" onclick="switchTab('dialog1')" id="tab-dialog1">📊 對話歷程1</button>
      <button class="tab-btn disabled" onclick="switchTab('dialog2')" id="tab-dialog2">📊 對話歷程2</button>
    </div>
    <div class="viewer-content">
      <!-- Tab 1: Work -->
      <div class="tab-pane active" id="work-pane">
        <div id="pdf-controls">
          <button onclick="prevPage()">◀ 上一頁</button>
          <span id="pdf-page-info">—</span>
          <button onclick="nextPage()">下一頁 ▶</button>
          <select id="scale-select" onchange="changeScale(this.value)">
            <option value="0.8">80%</option>
            <option value="1.0" selected>100%</option>
            <option value="1.25">125%</option>
            <option value="1.5">150%</option>
            <option value="2.0">200%</option>
          </select>
        </div>
        <div id="work-container"></div>
      </div>
      <!-- Tab 2: Entry form -->
      <div class="tab-pane" id="entry-pane">
        <div id="entry-container"></div>
      </div>
      <!-- Tab 3: Dialog 1 -->
      <div class="tab-pane" id="dialog1-pane">
        <div id="dialog1-container" style="flex:1;overflow:auto;width:100%"></div>
        <div class="cell-preview-bar" id="dialog1-preview">
          <span class="cell-preview-label">儲存格內容</span>
          <span class="cell-preview-addr" id="dialog1-preview-addr">—</span>
          <span class="cell-preview-content" id="dialog1-preview-content">點擊儲存格以檢視完整內容</span>
        </div>
      </div>
      <!-- Tab 4: Dialog 2 -->
      <div class="tab-pane" id="dialog2-pane">
        <div id="dialog2-container" style="flex:1;overflow:auto;width:100%"></div>
        <div class="cell-preview-bar" id="dialog2-preview">
          <span class="cell-preview-label">儲存格內容</span>
          <span class="cell-preview-addr" id="dialog2-preview-addr">—</span>
          <span class="cell-preview-content" id="dialog2-preview-content">點擊儲存格以檢視完整內容</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Right: Scoring -->
  <div class="right-panel">
    <div class="panel-header" id="scoring-title">請選擇作品以開始評分</div>
    <div class="scoring-body" id="scoring-body">
      <p style="color:var(--muted);font-size:0.82rem;line-height:1.7">從左側點選作品後，右側將顯示評分欄位。<br><br>評分資料自動儲存於瀏覽器 localStorage，完成後請輸出 CSV 備份。</p>
    </div>
  </div>
</div>

<div id="toast"></div>

// ===== State =====
let currentWork = null;
let activeTab = 'work';
let pdfDoc = null, pdfPage = 1, pdfScale = 1.0, pdfRenderTask = null;
let activePdfContainer = 'work-container';

// ===== Storage =====
function loadStorage() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; }
}
function saveStorage(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
function getWorkData(id) { return (loadStorage()[id] || {}); }
function saveWorkData(id, data) {
  const s = loadStorage(); s[id] = { ...s[id], ...data }; saveStorage(s);
}

// ===== Score calc =====
function calcTotal(w, d) {
  const vals = CRITERIA.map(c => d[c.key]);
  if (vals.some(v => v == null)) return null;
  return vals.reduce((s, v) => s + v, 0);
}
function calcInitial(w) {
  return CRITERIA.reduce((s, c) => s + (w.initial[c.key] || 0), 0);
}

// ===== Init =====
(function init() {
  const name = localStorage.getItem('reviewer_name');
  if (name) document.getElementById('reviewer-display').textContent = name;
  document.getElementById('work-count').textContent = WORKS.length;
  renderWorkList();
})();

// ===== Work List =====
function renderWorkList() {
  const s = loadStorage();
  const list = document.getElementById('work-list');
  list.innerHTML = WORKS.map(w => {
    const d = s[w.id] || {};
    const total = calcTotal(w, d);
    const done = total !== null;
    const active = currentWork?.id === w.id ? ' active' : '';
    return `<div class="work-item${active}" onclick="selectWork(${w.id})">
      <div class="num">#${w.id}</div>
      <div class="title">${w.title}</div>
      <div class="meta">${w.school} · ${w.grade}</div>
      <div class="score-badge${done?' done':''}">初審: ${calcInitial(w)} / 複審: ${total !== null ? total : '—'}</div>
    </div>`;
  }).join('');
}

// ===== Select Work =====
function selectWork(id) {
  currentWork = WORKS.find(w => w.id === id);
  renderWorkList();
  renderScoring();

  const tab4 = document.getElementById('tab-dialog2');
  const has = !!currentWork.dialogFile2;
  tab4.classList.toggle('disabled', !has);
  tab4.title = has ? '' : '此作品無第二份對話歷程';
  if (activeTab === 'dialog2' && !has) { activeTab = 'work'; }

  switchTab(activeTab);
}

// ===== Tab switching =====
function switchTab(tab) {
  if (tab === 'dialog2' && !currentWork?.dialogFile2) return;
  activeTab = tab;
  TAB_IDS.forEach(id => {
    document.getElementById('tab-' + id)?.classList.toggle('active', id === tab);
    document.getElementById(id + '-pane')?.classList.toggle('active', id === tab);
  });
  renderActiveTab();
}

function renderActiveTab() {
  if (!currentWork) return;
  switch (activeTab) {
    case 'work':    renderWorkFile(); break;
    case 'entry':   renderEntryFile(); break;
    case 'dialog1': renderExcel(1); break;
    case 'dialog2': renderExcel(2); break;
  }
}

// ===== File path helper =====
function getFilePath(w, field) {
  if (!w[field]) return null;
  return `${FILE_BASE}${w.folder}/${w[field]}`;
}
function getExt(filename) {
  return filename ? filename.split('.').pop().toLowerCase() : '';
}
function extOpenBtn(url, label) {
  return `<div class="ext-btn-wrap">
    <p style="color:var(--muted);font-size:0.85rem">此格式無法直接預覽</p>
    <a class="ext-link-btn" href="${url}" target="_blank">⬇ 開啟 / 下載 ${label}</a>
  </div>`;
}

// ===== PDF rendering =====
async function loadPdf(url, containerId) {
  activePdfContainer = containerId;
  const controls = document.getElementById('pdf-controls');
  if (controls) controls.style.display = containerId === 'work-container' ? 'flex' : 'flex';
  const container = document.getElementById(containerId);
  container.innerHTML = '<p style="color:var(--muted);margin-top:40px;text-align:center">載入 PDF 中…</p>';
  document.getElementById('pdf-page-info').textContent = '載入中…';
  try {
    pdfDoc = await pdfjsLib.getDocument(url).promise;
    pdfPage = 1;
    await renderPdfPage(containerId);
  } catch(e) {
    container.innerHTML = `<div style="color:var(--red);padding:20px;text-align:center">PDF 載入失敗：${e.message}</div>`;
  }
}

async function renderPdfPage(containerId) {
  if (!pdfDoc) return;
  if (pdfRenderTask) { try { pdfRenderTask.cancel(); } catch {} }
  const cid = containerId || activePdfContainer;
  const page = await pdfDoc.getPage(pdfPage);
  const vp = page.getViewport({ scale: pdfScale });
  const canvas = document.createElement('canvas');
  canvas.width = vp.width; canvas.height = vp.height;
  const container = document.getElementById(cid);
  container.innerHTML = '';
  container.appendChild(canvas);
  pdfRenderTask = page.render({ canvasContext: canvas.getContext('2d'), viewport: vp });
  await pdfRenderTask.promise;
  document.getElementById('pdf-page-info').textContent = `${pdfPage} / ${pdfDoc.numPages}`;
}

function prevPage() { if (pdfDoc && pdfPage > 1) { pdfPage--; renderPdfPage(activePdfContainer); } }
function nextPage() { if (pdfDoc && pdfPage < pdfDoc.numPages) { pdfPage++; renderPdfPage(activePdfContainer); } }
function changeScale(v) { pdfScale = parseFloat(v); renderPdfPage(activePdfContainer); }

// ===== Tab 1: Work file =====
async function renderWorkFile() {
  const w = currentWork;
  const path = getFilePath(w, 'workFile');
  const ext = getExt(w.workFile);
  const controls = document.getElementById('pdf-controls');
  const container = document.getElementById('work-container');

  if (!path) { controls.style.display = 'none'; container.innerHTML = '<div class="no-file-placeholder"><div class="icon">📄</div><div>無作品檔案</div></div>'; return; }

  if (['jpg','jpeg','png','gif','webp'].includes(ext)) {
    controls.style.display = 'none';
    container.innerHTML = `<div style="width:100%;display:flex;align-items:center;justify-content:center;padding:12px"><img src="${path}" style="max-width:100%;object-fit:contain"></div>`;
  } else if (ext === 'pdf') {
    controls.style.display = 'flex';
    await loadPdf(path, 'work-container');
  } else {
    controls.style.display = 'none';
    container.innerHTML = extOpenBtn(path, '作品');
  }
}

// ===== Tab 2: Entry form =====
async function renderEntryFile() {
  const w = currentWork;
  const path = getFilePath(w, 'entryFile');
  const ext = getExt(w.entryFile);
  const container = document.getElementById('entry-container');
  document.getElementById('pdf-controls').style.display = 'none';

  if (!path) { container.innerHTML = '<div class="no-file-placeholder"><div class="icon">📋</div><div>無報名表檔案</div></div>'; return; }

  if (ext === 'pdf') {
    document.getElementById('pdf-controls').style.display = 'flex';
    await loadPdf(path, 'entry-container');
  } else {
    container.innerHTML = extOpenBtn(path, '報名表');
  }
}

// ===== Tab 3 & 4: Excel =====
function colLabel(n) {
  let s = '';
  for (n++; n > 0; n = Math.floor((n - 1) / 26))
    s = String.fromCharCode(((n - 1) % 26) + 65) + s;
  return s;
}

async function renderExcel(num) {
  const field = `dialogFile${num}`;
  const containerId = `dialog${num}-container`;
  const previewAddr = document.getElementById(`dialog${num}-preview-addr`);
  const previewContent = document.getElementById(`dialog${num}-preview-content`);
  const container = document.getElementById(containerId);
  const bar = document.getElementById(`dialog${num}-preview`);
  const w = currentWork;
  document.getElementById('pdf-controls').style.display = 'none';

  if (previewAddr) previewAddr.textContent = '—';
  if (previewContent) previewContent.textContent = '點擊儲存格以檢視完整內容';

  if (!w[field]) {
    container.innerHTML = `<div class="no-file-placeholder"><div class="icon">📊</div><div>無第 ${num} 份對話歷程</div></div>`;
    if (bar) bar.style.display = 'none';
    return;
  }
  if (bar) bar.style.display = 'flex';

  const path = getFilePath(w, field);
  container.innerHTML = '<p style="color:var(--muted);padding:20px;text-align:center">載入中…</p>';

  try {
    const resp = await fetch(path);
    const buf = await resp.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

    const rows = data.map((row, ri) => {
      const isHeader = ri === 0;
      const cells = row.map((cell, ci) => {
        const tag = isHeader ? 'th' : 'td';
        const addr = `${colLabel(ci)}${ri + 1}`;
        const disp = String(cell ?? '');
        const short = disp.length > 60 ? disp.slice(0, 60) + '…' : disp;
        return `<${tag} data-addr="${addr}" data-full="${disp.replace(/"/g,'&quot;').replace(/\n/g,'&#10;')}">${short}</${tag}>`;
      }).join('');
      return `<tr>${cells}</tr>`;
    }).join('');

    container.innerHTML = `<div style="padding:10px;overflow:auto;width:100%;height:100%"><table class="xlsx-table" id="xlsx-table-${num}">${rows}</table></div>`;

    document.getElementById(`xlsx-table-${num}`).addEventListener('click', e => {
      const cell = e.target.closest('td, th');
      if (!cell) return;
      document.querySelectorAll(`#xlsx-table-${num} .selected`).forEach(el => el.classList.remove('selected'));
      cell.classList.add('selected');
      if (previewAddr) previewAddr.textContent = cell.dataset.addr || '';
      if (previewContent) previewContent.textContent = (cell.dataset.full || cell.textContent) || '（空白）';
    });
  } catch(e) {
    container.innerHTML = extOpenBtn(path, `對話歷程${num}`);
  }
}

// ===== Scoring UI =====
function renderScoring() {
  if (!currentWork) return;
  const w = currentWork;
  const d = getWorkData(w.id);
  document.getElementById('scoring-title').textContent = `#${w.id} ${w.title}`;

  const initTotal = calcInitial(w);
  const revTotal = calcTotal(w, d);

  let html = `<div class="initial-row">
    <div style="width:100%;font-size:0.75rem;color:var(--muted);margin-bottom:4px">初審分數</div>`;
  CRITERIA.forEach(c => {
    html += `<span title="${c.name}" style="display:inline-flex;align-items:center;gap:3px">
      <span style="color:var(--muted)">${c.name.slice(0,2)}</span>
      <span>${w.initial[c.key]}</span>
    </span> `;
  });
  html += `<span style="margin-left:auto;font-weight:700;color:var(--accent2)">合計 ${initTotal}</span>
  </div>`;

  html += `<div style="margin-bottom:14px">
    <div style="font-size:0.75rem;color:var(--muted);margin-bottom:6px;font-weight:600;letter-spacing:.5px">快速一鍵填分（全項目）</div>
    <div class="quick-btns">
      ${QUICK_SCORES.map(s => `<button class="quick-btn" onclick="applyAll(${s})">${s} 分</button>`).join('')}
    </div>
  </div>`;

  CRITERIA.forEach(c => {
    const val = d[c.key] != null ? d[c.key] : '';
    html += `<div class="criterion-block">
      <div class="criterion-label">
        <span>${c.name}</span>
        <input type="number" min="0" max="20" class="score-input" id="inp-${c.key}" value="${val}"
               oninput="onScoreInput('${c.key}', this.value)" placeholder="0~20">
      </div>
      <div class="criterion-desc">${c.desc}</div>
      <div class="quick-btns">
        ${QUICK_SCORES.map(s => `<button class="quick-btn${val==s?' selected':''}" onclick="quickScore('${c.key}',${s})">${s}</button>`).join('')}
      </div>
    </div>`;
  });

  html += `<hr class="divider">
  <div class="total-row">
    <span>複審總分</span>
    <div style="text-align:right">
      <div class="total-score" id="total-score-display">${revTotal !== null ? revTotal : '—'}</div>
      <div class="initial-total">初審 ${initTotal} 分</div>
    </div>
  </div>
  <hr class="divider">
  <div style="font-size:0.8rem;margin-bottom:5px;color:var(--muted)">評語備注（選填）</div>
  <textarea class="comment-area" id="comment-area" placeholder="輸入評語…" oninput="onCommentInput(this.value)">${d.comment || ''}</textarea>
  <div class="action-btns">
    <button class="action-btn btn-ai" onclick="toggleAI()">🤖 AI 建議</button>
    <button class="action-btn btn-next" onclick="nextWork()">下一組 ▶</button>
  </div>
  <div class="ai-panel" id="ai-panel">
    <div style="font-size:0.78rem;color:var(--muted);margin-bottom:6px">Claude API Key（儲存於本機）</div>
    <input type="password" id="ai-key" placeholder="sk-ant-..." value="${localStorage.getItem('claude_api_key')||''}">
    <button class="action-btn btn-ai" style="width:100%" onclick="runAI()">送出分析</button>
    <div class="ai-result" id="ai-result"></div>
  </div>`;

  document.getElementById('scoring-body').innerHTML = html;
}

function onScoreInput(key, val) {
  const n = parseInt(val);
  if (isNaN(n) || n < 0 || n > 20) return;
  saveWorkData(currentWork.id, { [key]: n });
  updateTotalDisplay();
  renderWorkList();
  highlightQuick(key, n);
}

function applyAll(val) {
  if (!currentWork) return;
  CRITERIA.forEach(c => saveWorkData(currentWork.id, { [c.key]: val }));
  renderScoring();
  renderWorkList();
}

function quickScore(key, val) {
  saveWorkData(currentWork.id, { [key]: val });
  const inp = document.getElementById('inp-' + key);
  if (inp) inp.value = val;
  updateTotalDisplay();
  renderWorkList();
  highlightQuick(key, val);
}

function highlightQuick(key, val) {
  document.querySelectorAll('.criterion-block').forEach(block => {
    const inp = block.querySelector(`#inp-${key}`);
    if (!inp) return;
    block.querySelectorAll('.quick-btn').forEach(btn => {
      btn.classList.toggle('selected', parseInt(btn.textContent) === val);
    });
  });
}

function updateTotalDisplay() {
  const d = getWorkData(currentWork.id);
  const t = calcTotal(currentWork, d);
  const el = document.getElementById('total-score-display');
  if (el) el.textContent = t !== null ? t : '—';
}

function onCommentInput(val) {
  saveWorkData(currentWork.id, { comment: val });
}

// ===== AI =====
let aiVisible = false;
function toggleAI() {
  const panel = document.getElementById('ai-panel');
  if (!panel) return;
  aiVisible = !aiVisible;
  panel.classList.toggle('show', aiVisible);
}

async function runAI() {
  const key = document.getElementById('ai-key').value.trim();
  if (!key) { showToast('請輸入 Claude API Key'); return; }
  localStorage.setItem('claude_api_key', key);
  const result = document.getElementById('ai-result');
  result.textContent = '分析中…';

  const w = currentWork;
  const d = getWorkData(w.id);
  const criteriaDesc = CRITERIA.map(c => `${c.name}（初審${w.initial[c.key]}分）：${c.desc}`).join('\n');

  const prompt = `你是一位評審委員助手，正在審查「AI創意領航員：小學生成式AI應用競賽」國小組作品。

作品名稱：${w.title}
學校：${w.school}　年級：${w.grade}

評分標準（各項滿分20分）：
${criteriaDesc}

請根據以上資訊，對每項給出0~20分的建議分數，並說明理由（簡短即可）。`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 600,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await resp.json();
    if (data.error) { result.textContent = '錯誤：' + data.error.message; return; }
    result.textContent = data.content[0].text;
  } catch(e) {
    result.textContent = '網路錯誤：' + e.message;
  }
}

// ===== CSV Export =====
function exportCSV() {
  const reviewer = localStorage.getItem('reviewer_name') || '未設定';
  const date = new Date().toISOString().slice(0, 10);
  const header = ['組別', '學校', '年級', '題目', ...CRITERIA.map(c => c.name), '複審總分', '初審總分', '評語', '評審姓名'];
  const rows = [header];
  const s = loadStorage();

  WORKS.forEach(w => {
    const d = s[w.id] || {};
    const scores = CRITERIA.map(c => d[c.key] != null ? d[c.key] : '');
    const total = calcTotal(w, d);
    rows.push([w.id, w.school, w.grade, w.title, ...scores, total !== null ? total : '', calcInitial(w), d.comment || '', reviewer]);
  });

  const csv = '﻿' + rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `複審評分_${reviewer}_${date}.csv`;
  a.click();
  showToast('CSV 已下載');
}

// ===== Reviewer / Clear / Next / Toast =====
function setReviewerName() {
  const name = prompt('請輸入評審姓名：', localStorage.getItem('reviewer_name') || '');
  if (name !== null) {
    localStorage.setItem('reviewer_name', name);
    document.getElementById('reviewer-display').textContent = name || '評審姓名';
    showToast('姓名已儲存');
  }
}

function clearAll() {
  if (!confirm('確定要清除所有評分資料？此操作無法復原。')) return;
  localStorage.removeItem(STORAGE_KEY);
  renderWorkList();
  if (currentWork) renderScoring();
  showToast('已清除所有評分資料');
}

function nextWork() {
  const idx = WORKS.findIndex(w => w.id === currentWork.id);
  if (idx < WORKS.length - 1) {
    selectWork(WORKS[idx + 1].id);
  } else {
    showToast('已是最後一組作品');
  }
}

function showToast(msg, ms = 2200) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, ms);
}
</script>
